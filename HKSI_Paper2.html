const chapters=[...new Set(rows.map(r=>r.ch))];
const storageKey='hksi_p2_focus_v4';
let focused=new Set(JSON.parse(localStorage.getItem(storageKey)||'[]'));
let currentCh='';
let focusOnly=false;
let quizMode=false;
let showAnswers=false;
const chips=document.getElementById('chips');
const focusOnlyBtn=document.getElementById('focusOnly');
const clearFocusBtn=document.getElementById('clearFocus');
const focusCount=document.getElementById('focusCount');
const quizBtn=document.getElementById('quizMode');
const checkQuizBtn=document.getElementById('checkQuiz');
const toggleAnswersBtn=document.getElementById('toggleAnswers');
const quizMsg=document.getElementById('quizMsg');
const keyOf=(r)=>[r.ch,r.type,r.item,r.num].join('|');
function saveFocus(){localStorage.setItem(storageKey,JSON.stringify([...focused]));updateFocusCount();}
function updateFocusCount(){focusCount.textContent=`已關注 ${focused.size} 條`;focusOnlyBtn.classList.toggle('active',focusOnly);quizBtn.classList.toggle('active',quizMode);toggleAnswersBtn.textContent=showAnswers?'隱藏答案':'顯示答案';}
chips.innerHTML='<button class="chip active" data-ch="">全部章節</button>'+chapters.map(c=>`<button class="chip" data-ch="${c}">${c.replace('第','Ch')}</button>`).join('');
chips.addEventListener('click',e=>{if(!e.target.classList.contains('chip'))return;document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));e.target.classList.add('active');currentCh=e.target.dataset.ch;render();});
document.getElementById('q').addEventListener('input',render);document.getElementById('type').addEventListener('change',render);
focusOnlyBtn.addEventListener('click',()=>{focusOnly=!focusOnly;render();});
clearFocusBtn.addEventListener('click',()=>{if(!focused.size)return;if(confirm('確定清除全部關注？')){focused.clear();saveFocus();render();}});
quizBtn.addEventListener('click',()=>{quizMode=!quizMode;showAnswers=false;quizMsg.textContent='';render();});
checkQuizBtn.addEventListener('click',checkQuizAnswers);
toggleAnswersBtn.addEventListener('click',()=>{if(!quizMode)quizMode=true;showAnswers=!showAnswers;quizMsg.textContent=showAnswers?'已顯示答案':'已隱藏答案';render();});
document.getElementById('grid').addEventListener('change',e=>{if(!e.target.classList.contains('focuscheck'))return;const k=e.target.dataset.key;if(e.target.checked)focused.add(k);else focused.delete(k);saveFocus();render();});

function escapeHtml(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function escapeAttr(s){return escapeHtml(s).replace(/'/g,'&#39;');}
function toHalfWidth(s){return String(s).replace(/[０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0)).replace(/[，]/g,',').replace(/[．]/g,'.');}
function normNum(s){return toHalfWidth(s).replace(/[,\s]/g,'').trim();}
function blankifyNumbers(text,keyPrefix){
  let idx=0;
  return escapeHtml(text).replace(/\d[\d,]*(?:\.\d+)?/g, m=>{
    idx++;
    const ans=escapeAttr(m);
    const qid=escapeAttr(keyPrefix+'#'+idx);
    const ansHtml=showAnswers?`<span class="answer">${ans}</span>`:'';
    return `<span class="blankwrap"><input class="quiz-input" data-qid="${qid}" data-answer="${ans}" inputmode="decimal" autocomplete="off" placeholder="?">${ansHtml}</span>`;
  });
}
function maskNumbers(text){
  return escapeHtml(text).replace(/\d[\d,]*(?:\.\d+)?/g, '▢');
}
function checkQuizAnswers(){
  if(!quizMode){quizMode=true;showAnswers=false;render();}
  const inputs=[...document.querySelectorAll('.quiz-input')];
  if(!inputs.length){quizMsg.textContent='沒有可核對的空格';return;}
  let ok=0, filled=0;
  inputs.forEach(inp=>{
    const v=normNum(inp.value);
    const a=normNum(inp.dataset.answer);
    inp.classList.remove('correct','wrong');
    if(v){filled++;}
    if(v && v===a){inp.classList.add('correct');ok++;}
    else{inp.classList.add('wrong');}
  });
  quizMsg.textContent=`核對：答對 ${ok} / ${inputs.length} 空；已填 ${filled} 空`;
}
function render(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const typ=document.getElementById('type').value;
  const filtered=rows.filter(r=>{const k=keyOf(r);return (!currentCh||r.ch===currentCh)&&(!typ||r.type===typ)&&(!focusOnly||focused.has(k))&&(!q||Object.values(r).join(' ').toLowerCase().includes(q));});
  document.getElementById('count').textContent=`顯示 ${filtered.length} / ${rows.length} 條｜Dark theme｜${focusOnly?'關注模式':'全部模式'}｜${quizMode?'填空模式':'閱讀模式'}`;
  const prev={};
  document.querySelectorAll('.quiz-input').forEach(inp=>{prev[inp.dataset.qid]={v:inp.value,c:inp.classList.contains('correct'),w:inp.classList.contains('wrong')};});
  document.getElementById('grid').innerHTML=filtered.map(r=>{
    const k=keyOf(r);const isOn=focused.has(k);
    const numHtml=quizMode?blankifyNumbers(r.num,k):escapeHtml(r.num);
    const noteHtml=quizMode?maskNumbers(r.note):escapeHtml(r.note);
    return `<article class="card ${isOn?'focused':''}"><div class="top"><div><div class="chapter">${escapeHtml(r.ch)}</div><span class="tag ${escapeHtml(r.type)}">${escapeHtml(r.type)}</span></div><label class="focus-toggle"><input class="focuscheck" type="checkbox" data-key="${escapeAttr(k)}" ${isOn?'checked':''}><span class="focus-label">關注</span></label></div><div class="item">${escapeHtml(r.item)}</div><div class="num ${quizMode?'quizline':''}">${numHtml}</div><div class="note">${noteHtml}</div><div class="source">來源：${escapeHtml(r.src)}</div></article>`
  }).join('');
  document.querySelectorAll('.quiz-input').forEach(inp=>{const p=prev[inp.dataset.qid];if(p){inp.value=p.v;if(p.c)inp.classList.add('correct');if(p.w)inp.classList.add('wrong');}});
  updateFocusCount();
}
render();
</script>
</body>
</html>
