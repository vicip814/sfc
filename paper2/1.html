<header><div class="htitle"><h1>HKSI Paper 2｜76題以外補充考點</h1><button class="hToggle" id="hToggle" aria-expanded="true">收合 ▲</button></div><div id="hDetails"><div class="sub">用來補充「知識測驗76題」以外的高頻概念、易混位、程序及風險點。適合手機重溫。</div>
<div class="controls"><input id="q" placeholder="搜尋：例如 內幕、FRR、客戶資產、保證金、ATS…"><select id="chapter"><option value="">全部章節</option><option>第1章 監管架構</option><option>第2章 附屬法例</option><option>第3章 業務管理</option><option>第4章 聯交所交易</option><option>第5章 其他證券活動</option><option>第6章 期權及OTC衍生工具</option><option>第7章 市場失當及不當交易</option></select><select id="cat"><option value="">全部類別</option><option>合規</option><option>易混</option><option>概念</option><option>產品</option><option>程序</option><option>責任</option><option>風險</option></select><button id="focusBtn">只看關注</button></div><div class="stats"><span class="pill" id="count"></span><span class="pill">點選每張卡右上角「關注」可建立重溫清單</span></div></div></header>
<main id="app"></main><footer>建議配合原 PDF、76題問答 HTML、數字速記表一起使用。本頁是補充筆記，不取代原文。</footer>
<script>
const DATA=[{"ch": "第1章 監管架構", "cat": "概念", "topic": "SFO 與附屬法例的分工", "point": "《證券及期貨條例》是主體框架；附屬法例處理財政資源、客戶資產、紀錄、審計等營運細節。", "trap": "不要只背條例名稱；考試常問「哪類規則處理哪類日常營運要求」。", "memory": "主體定原則，附屬法例管細節。"}, {"ch": "第1章 監管架構", "cat": "易混", "topic": "守則及指引的法律效力", "point": "證監會守則及指引本身通常不具法律效力，也不凌駕法例，但不遵守會影響是否仍屬適當人選。", "trap": "「不是法律」不等於「可以不理」；違反守則可引致紀律/適當人選問題。", "memory": "守則不是硬法，但可變成發牌風險。"}, {"ch": "第1章 監管架構", "cat": "概念", "topic": "證監會風險為本監管", "point": "證監會對其認為風險較高的範疇投入更多監管資源，例如實地視察、監察、執法。", "trap": "不是平均監管所有中介人；重點在高風險業務/產品/客戶資產。", "memory": "高風險，高監管。"}, {"ch": "第1章 監管架構", "cat": "易混", "topic": "證監會 vs 金管局", "point": "認可財務機構如銀行從事證券受規管活動須成為註冊機構；金管局通常作前線監管，證監會仍有註冊及紀律權。", "trap": "銀行不是由證監會完全不管；是雙重框架，金管局前線，證監會有最終證券監管角色。", "memory": "銀行：HKMA 前線，SFC 註冊/紀律。"}, {"ch": "第1章 監管架構", "cat": "易混", "topic": "證監會 vs 香港交易所/聯交所/結算所", "point": "香港交易所及其交易所/結算所負責市場、交易、結算規則和市場營運；證監會監督及核准其規則，並負責中介人前線審慎及操守監管。", "trap": "聯交所執行上市規則，但中介人操守及發牌不是聯交所主責。", "memory": "HKEX 管市場運作；SFC 管監督與中介。"}, {"ch": "第1章 監管架構", "cat": "程序", "topic": "持牌法團、註冊機構、持牌代表、有關人士", "point": "持牌法團是非銀行法團；註冊機構通常是銀行等認可財務機構；持牌代表替持牌法團進行受規管活動；有關人士替註冊機構進行受規管活動並列入金管局紀錄冊。", "trap": "不要把「持牌代表」用在銀行職員上；銀行用語通常是「有關人士」。", "memory": "公司牌照看 SFC；銀行人員看 HKMA 紀錄冊。"}, {"ch": "第1章 監管架構", "cat": "合規", "topic": "負責人員與執行董事", "point": "負責人員須積極參與或監督受規管活動，並由持牌法團任命及證監會核准；每名執行董事也須成為負責人員。", "trap": "負責人員不是名義角色；重點是實際監督及足夠權限。", "memory": "RO = 持牌代表 + 監督 + SFC 核准。"}, {"ch": "第1章 監管架構", "cat": "易混", "topic": "第1類完全附帶豁免", "point": "持有第1類牌照的人可在純粹附帶於第1類業務時，進行第4、6、9類活動；亦可為便利客戶取得或持有證券提供財務通融而不另取第8類。", "trap": "「附帶」是關鍵；若變成獨立業務線，就要重新考慮牌照。", "memory": "1號牌可附帶 4/6/9；margin 要看是否為自身證券客戶。"}, {"ch": "第1章 監管架構", "cat": "概念", "topic": "適當人選四大範疇", "point": "財政狀況/償付能力、學歷/資歷/經驗、稱職誠實公正能力、信譽品格可靠程度及財政穩健。", "trap": "考情境時要把個人紀律紀錄、破產、經驗不足、控制人背景全部放入適當人選框架。", "memory": "財、學、能、品。"}, {"ch": "第1章 監管架構", "cat": "合規", "topic": "企業管治的核心", "point": "良好管治關注管理層、董事會、股東及利益相關者之間的恰當關係，並透過透明度、問責、制衡、內控和合規文化落實。", "trap": "企業管治不是只適用上市公司；中介人本身也要有良好管治。", "memory": "治理 = 關係 + 制衡 + 透明 + 責任。"}, {"ch": "第2章 附屬法例", "cat": "概念", "topic": "FRR 的核心目的", "point": "財政資源規則讓證監會及時評估持牌法團償付能力及業務風險，以保障投資者和市場穩定。", "trap": "不要只背資本數字；FRR 是監控「能否還債」和「業務風險」。", "memory": "資本不是裝飾，是緩衝。"}, {"ch": "第2章 附屬法例", "cat": "易混", "topic": "FRR 適用對象", "point": "FRR 主要適用於持牌法團；註冊機構通常遵守金管局資本充足要求，不另受證監會 FRR 資本要求。", "trap": "銀行證券部門不按一般持牌法團 FRR 直接計最低資本。", "memory": "LC 用 FRR；RI 用 HKMA 資本框架。"}, {"ch": "第2章 附屬法例", "cat": "概念", "topic": "速動資產 vs 認可負債 vs 速動資金", "point": "速動資產是可較快變現的資產；認可負債是須計入的欠債；速動資金一般可理解為速動資產減認可負債後的緩衝。", "trap": "固定資產、商譽等不能用來支撐短期償債，通常扣減很高。", "memory": "可快變現才是速動。"}, {"ch": "第2章 附屬法例", "cat": "程序", "topic": "客戶證券的登記或存放", "point": "中介人須將客戶證券及抵押品按規則登記/存放於指定方式，例如客戶名義、核准銀行/保管人、結算所等。", "trap": "客戶資產不能任意放在公司自有帳戶或與公司資產混在一起。", "memory": "客戶資產要分清、放對、可追蹤。"}, {"ch": "第2章 附屬法例", "cat": "合規", "topic": "客戶授權的重要性", "point": "處理、存放、再質押或轉移客戶證券/抵押品時，很多情況須取得有效客戶授權。", "trap": "有授權也不代表可以無限制使用；仍受規則和客戶利益限制。", "memory": "授權是門票，不是免死金牌。"}, {"ch": "第2章 附屬法例", "cat": "程序", "topic": "客戶款項獨立帳戶", "point": "客戶款項須存入獨立帳戶；提款只可按規則用於客戶交易、結算、付款或客戶授權用途。", "trap": "最常見陷阱：把公司款項留在客戶帳戶，或把客戶款項用作公司營運資金。", "memory": "錢分開，提取有原因。"}, {"ch": "第2章 附屬法例", "cat": "程序", "topic": "成交單據、日結單、月結單", "point": "成交單據確認交易細節；日結單反映當日帳戶活動；月結單總結帳戶持倉、款項、抵押品及交易活動。", "trap": "不要把三種文件混淆；題目常問「哪種文件」須列明某資料。", "memory": "成交即單據；活動看日結；總覽看月結。"}, {"ch": "第2章 附屬法例", "cat": "合規", "topic": "備存紀錄的考試重點", "point": "紀錄須能解釋交易、客戶資產負債、會計分錄、投訴、授權及審計線索。", "trap": "「有做」不夠，考試假設沒有紀錄就難以證明已合規。", "memory": "沒有紀錄 = 合規證據不足。"}, {"ch": "第2章 附屬法例", "cat": "合規", "topic": "核數師角色", "point": "核數師不只是審計財務報表，也可能須就違規、客戶資產問題或不合規向證監會作出報告。", "trap": "核數師報告並非公司內部文件；監管上有通報功能。", "memory": "核數師是外部檢查點。"}, {"ch": "第2章 附屬法例", "cat": "易混", "topic": "投資者賠償基金的範圍", "point": "投資者賠償基金通常補償中介人違責造成的合資格損失，不補償正常投資虧損、市場風險或投資判斷錯誤。", "trap": "客戶買股票跌了，通常不是賠償基金保障範圍。", "memory": "賠違責，不賠輸錢。"}, {"ch": "第2章 附屬法例", "cat": "風險", "topic": "持倉限額及須申報持倉", "point": "制度目標是防止衍生工具持倉過度集中，影響市場秩序、穩定及交收風險。", "trap": "不是只管期貨；亦可涉及在聯交所買賣的股票期權。", "memory": "大倉要報，超限要批。"}, {"ch": "第2章 附屬法例", "cat": "合規", "topic": "場外衍生工具匯報/結算/備存紀錄", "point": "場外衍生工具規則包括匯報責任、強制結算責任及相關備存紀錄，源於金融危機後提高透明度和降低系統風險的改革。", "trap": "重點是透明度和系統風險，不只是文書行政。", "memory": "OTC 要看得見、管得到、留紀錄。"}, {"ch": "第3章 業務管理", "cat": "合規", "topic": "高級管理層責任", "point": "高級管理層須建立合規文化、清晰職責、匯報線、內控、投訴處理及監督架構。", "trap": "不能把合規完全推給合規主任；高級管理層仍負最終責任。", "memory": "Tone from the top。"}, {"ch": "第3章 業務管理", "cat": "合規", "topic": "MIC 八大核心職能", "point": "核心職能主管制度要求識別主要管理職能負責人，包括整體管理監督、主要業務線、營運監控、風險管理、財務會計、資訊科技、合規、反洗錢等。", "trap": "MIC 不一定全部都要持牌，但如果直接監督受規管活動，可能需要 RO/牌照配合。", "memory": "誰實際管核心功能，就要被識別。"}, {"ch": "第3章 業務管理", "cat": "概念", "topic": "操守準則一般原則", "point": "包括誠實公平、勤勉盡責、能力、客戶資料、客戶資產、利益衝突、合規及高級管理層責任。", "trap": "這些原則是情境題核心；遇到不公平交易、利益衝突、延誤執行，都可回到一般原則。", "memory": "八原則是萬用答題框架。"}, {"ch": "第3章 業務管理", "cat": "合規", "topic": "認識你的客戶 KYC", "point": "中介人須了解客戶身份、財政狀況、投資經驗、投資目標、風險承受能力及相關資料。", "trap": "KYC 不是只開戶時一次性填表；需要按情況更新和持續了解。", "memory": "不知道客戶，就難以判斷合適性。"}, {"ch": "第3章 業務管理", "cat": "合規", "topic": "合適性責任", "point": "提供建議或招攬時，要確保建議/產品適合客戶，並考慮產品風險、客戶目標、財務承受能力和經驗。", "trap": "高佣金或熱門產品不等於適合；專業投資者也不一定完全免除全部責任。", "memory": "產品要配人，不是人配產品。"}, {"ch": "第3章 業務管理", "cat": "程序", "topic": "客戶指示與交易紀錄", "point": "電話、電子及書面交易指示應有適當紀錄，能證明客戶授權、時間、內容和執行狀況。", "trap": "未經授權交易、指示不清、補錄紀錄是常見紀律風險。", "memory": "每張單都要有來源。"}, {"ch": "第3章 業務管理", "cat": "易混", "topic": "客戶盤 vs 公司自營盤", "point": "客戶盤應公平、按次序處理，並避免公司或員工交易優先於客戶利益。", "trap": "Front running/rat trading 常與這個原則相關。", "memory": "客戶利益先行。"}, {"ch": "第3章 業務管理", "cat": "合規", "topic": "利益衝突管理", "point": "中介人須識別、避免或妥善管理利益衝突；不能避免時要作充分披露並採取控制措施。", "trap": "披露不是萬能；嚴重衝突可能需要拒絕交易或設立隔離牆。", "memory": "先避，避不到就控，再披露。"}, {"ch": "第3章 業務管理", "cat": "程序", "topic": "投訴處理", "point": "應設立投訴渠道，迅速、公平、適當調查，保存紀錄，並從投訴反映內控缺口。", "trap": "投訴不是客服問題；可能是監管風險預警。", "memory": "投訴 = 內控雷達。"}, {"ch": "第3章 業務管理", "cat": "風險", "topic": "內部監控分工", "point": "前線交易、交收、會計、監督、合規及風險管理應有適當分隔，避免同一人既執行又覆核。", "trap": "小公司也要有補償性控制，不能以人手少為由完全不分工。", "memory": "做事的人，不應單獨查自己。"}, {"ch": "第3章 業務管理", "cat": "風險", "topic": "業務風險類別", "point": "中介人的主要風險包括市場風險、信貸風險、流動性風險、營運風險、合規風險和聲譽風險。", "trap": "考題可能用事件描述風險，例如系統故障屬營運風險，客戶無力補倉屬信貸風險。", "memory": "先分類，再講控制。"}, {"ch": "第3章 業務管理", "cat": "合規", "topic": "AML 風險為本方法", "point": "反洗錢不是機械清單，而是按客戶、產品、渠道、地區等風險評估，採取相稱的 CDD、監察及審查。", "trap": "高風險客戶需要加強盡職審查，不是同一份表格處理所有人。", "memory": "AML = RBA + CDD + 持續監察。"}, {"ch": "第3章 業務管理", "cat": "合規", "topic": "可疑交易申報與禁止通風報信", "point": "懷疑洗錢/恐怖分子資金籌集時，應向 JFIU 申報；同時不得向客戶透露已作申報或正在調查。", "trap": "最常見陷阱是向客戶解釋「因為我們要報告你」而構成 tipping-off 風險。", "memory": "可疑要報，報了不能講。"}, {"ch": "第3章 業務管理", "cat": "合規", "topic": "持續監察客戶活動", "point": "交易模式、資金來源、客戶背景和預期用途不一致時，應跟進、查問、升級或申報。", "trap": "AML 不是開戶完成即結束；異常交易才是高頻考點。", "memory": "開戶只是起點，異常才是考點。"}, {"ch": "第4章 聯交所交易", "cat": "易混", "topic": "聯交所產品並不全是普通股票", "point": "聯交所買賣產品包括股票、債務證券、ETF、REIT、權證、牛熊證、股票期權等；部分是衍生產品但仍在聯交所交易。", "trap": "不要因為在聯交所交易就以為全部是現貨股票。", "memory": "交易場地 ≠ 產品性質。"}, {"ch": "第4章 聯交所交易", "cat": "概念", "topic": "交易所參與者與結算參與者", "point": "交易所參與者可在交易所交易；結算參與者透過結算所處理結算交收；兩者資格及責任不同。", "trap": "可交易不等於直接結算；可能需透過全面結算參與者。", "memory": "交易權和結算權分開。"}, {"ch": "第4章 聯交所交易", "cat": "程序", "topic": "中央結算與交收", "point": "香港結算透過 CCASS 提供中央結算及交收服務，並對市場風險設有保證金、抵押品、買入補購等機制。", "trap": "CCASS 不是只是存倉系統，也是市場風險管理基建。", "memory": "CCASS = 存管 + 結算 + 風控。"}, {"ch": "第4章 聯交所交易", "cat": "概念", "topic": "CNS 連續淨額交收", "point": "中央結算系統把多邊交易淨額化，減少交收筆數和風險；香港結算在 CNS 中扮演中央對手方角色。", "trap": "淨額交收不是逐單對手交收；風險集中到中央對手方管理。", "memory": "多筆變淨額，對手變 HKSCC。"}, {"ch": "第4章 聯交所交易", "cat": "程序", "topic": "交收失敗與補購", "point": "未能按時交付證券可引致補購及相關費用/紀律後果，以確保市場交收完整。", "trap": "不要以為只要付款就完成；證券交付同樣重要。", "memory": "交不到貨，就可能被買入補購。"}, {"ch": "第4章 聯交所交易", "cat": "風險", "topic": "惡劣天氣交易安排", "point": "新版手冊已更新香港證券及衍生產品市場於惡劣天氣下維持交易的安排，市場營運與中介人應有相應業務連續性安排。", "trap": "舊觀念「打風一定停市」不一定適用新版考試。", "memory": "惡劣天氣也要準備可交易。"}, {"ch": "第4章 聯交所交易", "cat": "產品", "topic": "權證 vs 牛熊證", "point": "兩者均為結構性產品；牛熊證有強制收回機制，權證則以到期/行使價等決定價值。", "trap": "牛熊證最大考點是「收回」風險，不只是槓桿。", "memory": "CBBC 有收回；權證看時間價值/行使價。"}, {"ch": "第4章 聯交所交易", "cat": "產品", "topic": "ETF 與 REIT", "point": "ETF 追蹤指數或資產組合；REIT 投資房地產並分派租金收益，兩者雖可交易但風險來源不同。", "trap": "不要把 REIT 當成普通地產股；其結構和分派要求不同。", "memory": "ETF 看追蹤；REIT 看資產及租金。"}, {"ch": "第4章 聯交所交易", "cat": "程序", "topic": "短暫停牌、停牌、除牌、撤回上市", "point": "停牌/除牌是維持市場公平、有序及投資者保障的工具；原因可包括資料披露不足、重大事件、上市規則不合規。", "trap": "停牌不一定是懲罰，也可為確保市場有足夠資料。", "memory": "資料不足，可先停。"}, {"ch": "第4章 聯交所交易", "cat": "合規", "topic": "聯交所紀律程序", "point": "交易所可就參與者違反規則採取紀律行動；證監會也可在其監管權限內採取行動。", "trap": "聯交所紀律和證監會紀律可因同一事件涉及不同規則層面。", "memory": "市場規則違反看交易所；發牌操守看 SFC。"}, {"ch": "第4章 聯交所交易", "cat": "概念", "topic": "交易費用不只佣金", "point": "交易成本可能包括經紀佣金、交易徵費、交易費、印花稅、會財局徵費等。", "trap": "客戶總成本不只 broker commission；考題可能問哪項是法定/交易所收費。", "memory": "買賣成本 = 多項費用合計。"}, {"ch": "第4章 聯交所交易", "cat": "合規", "topic": "上市規則與證監會介入", "point": "上市審批及持續責任涉及聯交所及證監會；證監會可就上市申請及企業交易中的嚴重失當作早期介入。", "trap": "上市規則不是完全由交易所孤立處理。", "memory": "上市監管是 SEHK + SFC。"}, {"ch": "第5章 其他證券活動", "cat": "易混", "topic": "核准介紹代理人的限制", "point": "核准介紹代理人可介紹客戶或轉交客戶要約，但不得處理客戶資產，且不因介紹業務承擔交易法律責任，除非其疏忽、故意失責或欺詐。", "trap": "AIA 不是小型 broker；最大特點是不能碰客戶資產。", "memory": "介紹可以，碰資產不可以。"}, {"ch": "第5章 其他證券活動", "cat": "易混", "topic": "第1類與第8類保證金融資", "point": "第1類持牌法團可附帶向自身證券客戶提供保證金融資；獨立提供證券保證金融資則屬第8類。", "trap": "考試會用「某公司只是借錢給投資者買上市證券」測你是否識別第8類。", "memory": "跟證券交易綁定，看第1類附帶；獨立放 margin，看第8類。"}, {"ch": "第5章 其他證券活動", "cat": "風險", "topic": "保證金貸款風控", "point": "應有信貸評估、抵押品扣減、集中度限制、追繳保證金、強制斬倉及客戶通知政策。", "trap": "只靠抵押品市值不足；還要看客戶還款能力和集中度。", "memory": "Margin 風控 = 客戶 + 抵押品 + 集中度。"}, {"ch": "第5章 其他證券活動", "cat": "程序", "topic": "再質押客戶證券", "point": "客戶證券抵押品再質押需要有效授權及遵守上限/規則，並要清楚記錄。", "trap": "再質押不是公司可任意把客戶股票拿去融資。", "memory": "有授權、有上限、有紀錄。"}, {"ch": "第5章 其他證券活動", "cat": "易混", "topic": "賣空的核心要求", "point": "賣空通常須為有擔保/備有證券的賣空，並限於指定證券；下單時須作出相應披露。", "trap": "裸賣空是高風險違規位；不要只背「可以賣空」。", "memory": "可賣空 ≠ 可裸賣。"}, {"ch": "第5章 其他證券活動", "cat": "合規", "topic": "淡倉申報", "point": "持有達到申報門檻的淡倉需按規則申報，目的在提高市場透明度及監察系統性風險。", "trap": "申報義務可落在持倉人，不只是經紀。", "memory": "大淡倉要透明。"}, {"ch": "第5章 其他證券活動", "cat": "概念", "topic": "證券借貸的用途", "point": "證券借貸可支援賣空交收、提升市場流動性及讓長倉持有人賺取借貸費用。", "trap": "證券借貸不是必然代表投機；也可為交收及市場效率服務。", "memory": "借貨可交收，也可創造流動性。"}, {"ch": "第5章 其他證券活動", "cat": "合規", "topic": "研究報告及分析員衝突", "point": "證券研究要管理投行業務、交易、自營及個人持倉帶來的利益衝突；研究報告須有適當披露。", "trap": "分析員不是只要寫得準；獨立性及披露是監管重點。", "memory": "研究重點：獨立、披露、避衝突。"}, {"ch": "第5章 其他證券活動", "cat": "合規", "topic": "網上證券交易風險", "point": "互聯網交易須重視身份認證、加密、系統容量、入侵監察、備份、事故通報及客戶教育。", "trap": "網上交易不是「平台可用」就合規；網絡保安是操守要求。", "memory": "網上交易 = 技術風險 + 合規風險。"}, {"ch": "第5章 其他證券活動", "cat": "程序", "topic": "DMA 直接市場接入", "point": "中介人給予客戶直接市場接入時，仍須監察客戶交易、設定限制、防止錯單/違規單進入市場。", "trap": "客戶自己按盤不代表中介人免責。", "memory": "DMA 給入口，中介仍要守門。"}, {"ch": "第5章 其他證券活動", "cat": "概念", "topic": "ATS 自動化交易服務", "point": "ATS 是透過非認可交易所/結算所提供的電子設施，為證券或期貨合約提供交易機制，通常涉及第7類或認可要求。", "trap": "不要把每個網上交易平台都等同 ATS；關鍵是是否提供交易機制。", "memory": "提供交易機制，可能是 ATS。"}, {"ch": "第5章 其他證券活動", "cat": "程序", "topic": "向公眾作出證券要約", "point": "向公眾作出投資要約、廣告或邀請通常受 SFO 第103條、招股章程及認可文件規則限制，除非有豁免。", "trap": "只在 WhatsApp/網頁發資料也可能是廣告或邀請，不只正式招股書。", "memory": "公開推銷要看認可/豁免。"}, {"ch": "第5章 其他證券活動", "cat": "概念", "topic": "跨境交易的雙重合規", "point": "跨境活動要同時考慮香港發牌/推銷限制及境外法律要求，例如人在香港推介海外證券。", "trap": "海外產品不等於不受香港規管；人在香港進行活動仍可能觸發香港規則。", "memory": "產品在外地，行為在香港，也要管。"}, {"ch": "第5章 其他證券活動", "cat": "產品", "topic": "滬深港通基本風險", "point": "滬深港通涉及額度、交易日差異、外資持股限制、不能即日回轉買賣 A 股、結算及稅務等特有風險。", "trap": "不要用港股交易習慣直接套用 A 股。", "memory": "互聯互通，不等於完全一樣。"}, {"ch": "第5章 其他證券活動", "cat": "產品", "topic": "虛擬資產與證券監管", "point": "若虛擬資產構成證券或期貨合約，相關交易、意見、平台或管理活動可能觸發證監會發牌要求；平台營運另有指引。", "trap": "不是所有 VA 都是證券，但若有證券特徵就不能說完全不受 SFC 管。", "memory": "VA 要先看性質，再看活動。"}, {"ch": "第5章 其他證券活動", "cat": "合規", "topic": "穩定價格活動", "point": "公開發售後的穩定價格活動須在特定規則框架下進行，並有披露及限制，否則可能構成市場操控風險。", "trap": "「托價」若無合法穩定價格框架，可能踩入市場失當行為。", "memory": "合法穩價有框架，否則可能操控。"}, {"ch": "第6章 期權及OTC衍生工具", "cat": "產品", "topic": "交易所買賣期權的法律分類", "point": "聯交所股票期權在 SFO 下歸類為證券；期貨合約期權則歸類為期貨合約。", "trap": "不要見「期權」就全部歸第2類期貨合約交易。", "memory": "股票期權在 SEHK，是證券相關。"}, {"ch": "第6章 期權及OTC衍生工具", "cat": "產品", "topic": "認購期權與認沽期權", "point": "認購期權給予買方按行使價買入正股的權利；認沽期權給予買方按行使價賣出正股的權利。", "trap": "買方有權利非義務；賣方有履約義務。", "memory": "Call 買入權；Put 賣出權。"}, {"ch": "第6章 期權及OTC衍生工具", "cat": "產品", "topic": "美式期權特徵", "point": "聯交所股票期權屬美式期權，可在有效期內任何時間行使；歐式期權只可在到期日行使。", "trap": "考題常問可否到期前行使。", "memory": "美式 = 到期前也可行使。"}, {"ch": "第6章 期權及OTC衍生工具", "cat": "易混", "topic": "期權交易參與者與結算參與者", "point": "交易參與者可進行期權交易；結算參與者負責向 SEOCH 結算；交易權和結算權不同。", "trap": "像股票市場一樣，交易與結算資格可分開。", "memory": "可交易不等於可直接清算。"}, {"ch": "第6章 期權及OTC衍生工具", "cat": "風險", "topic": "期權按金目的", "point": "按金制度用於覆蓋期權賣方/持倉的潛在損失及市場波動風險，維持結算所安全。", "trap": "期權買方最大風險通常是期權金；賣方風險可能遠高於期權金。", "memory": "買方付 premium；賣方要 margin。"}, {"ch": "第6章 期權及OTC衍生工具", "cat": "程序", "topic": "客戶違責時可採取行動", "point": "中介人可按客戶協議和規則拒絕指示、平倉、行使/轉倉、出售抵押品或抵銷款項，以控制風險。", "trap": "客戶未補 margin，中介人不一定要等客戶同意才可控風險。", "memory": "違責先控風險。"}, {"ch": "第6章 期權及OTC衍生工具", "cat": "合規", "topic": "期權持倉監察", "point": "期權持倉受持倉限額及大額未平倉申報要求規管，中介人須監察客戶及自身持倉。", "trap": "不要只看單一帳戶；關連帳戶/受控制持倉也可能合併考慮。", "memory": "大倉要管，受控要合併。"}, {"ch": "第6章 期權及OTC衍生工具", "cat": "合規", "topic": "場外衍生工具發牌狀態", "point": "第11類及第12類受規管活動在手冊中註明尚未正式生效，但仍要認識場外衍生工具相關持續要求、匯報及風控。", "trap": "不是未生效就完全不用讀；第6章仍考 OTC 概念及規則。", "memory": "未全面生效，但仍有規管框架。"}, {"ch": "第6章 期權及OTC衍生工具", "cat": "風險", "topic": "OTC 對手方風險", "point": "場外衍生工具沒有交易所集中撮合和標準化結算時，對手方信貸、估值、抵押品和文件風險更重要。", "trap": "OTC 不是只看市場方向；文件和對手風險同樣高頻。", "memory": "OTC = 對手風險 + 估值風險 + 抵押品。"}, {"ch": "第6章 期權及OTC衍生工具", "cat": "合規", "topic": "非中央結算 OTC 保證金", "point": "非中央結算場外衍生工具需按監管要求建立保證金、抵押品、風險管理和紀錄機制；部分生效安排有延後。", "trap": "考試可問持牌人持續要求，不一定問計算公式。", "memory": "沒有中央結算，就靠 margin/內控補風險。"}, {"ch": "第7章 市場失當及不當交易", "cat": "概念", "topic": "雙軌制度", "point": "香港市場失當行為可透過民事市場失當行為審裁處或刑事程序處理；同類行為可有不同制裁路徑。", "trap": "民事不是「無後果」；可有冷淡對待令、取消資格、交還利潤等嚴重後果。", "memory": "民事管制裁，刑事管罪責。"}, {"ch": "第7章 市場失當及不當交易", "cat": "概念", "topic": "六類市場失當行為", "point": "包括內幕交易、虛假交易、操控價格、操控證券市場、披露關於受禁交易的資料、披露虛假或具誤導性資料誘使交易。", "trap": "要能分辨每類行為，不只是背清單。", "memory": "六類：內幕、假交易、操價、操市場、披露禁交易、虛假誘導。"}, {"ch": "第7章 市場失當及不當交易", "cat": "易混", "topic": "內幕消息三要素", "point": "資料通常須具體、未公開，且若公開可能對相關證券價格有重大影響。", "trap": "謠言、一般市場觀點或已公開資訊通常不構成同一層次的內幕消息。", "memory": "具體 + 未公開 + 價格敏感。"}, {"ch": "第7章 市場失當及不當交易", "cat": "易混", "topic": "虛假交易 vs 操控價格", "point": "虛假交易重點是造成交易活躍或市場供求假象；操控價格重點是人為影響價格。", "trap": "兩者可重疊，但答題要抓主要目的/效果。", "memory": "假象看 false trading；推價看 price rigging。"}, {"ch": "第7章 市場失當及不當交易", "cat": "易混", "topic": "操控證券市場", "point": "涉及創造虛假或誤導性的市場外觀，或使用市場力量影響價格/供求，使市場不再公平有序。", "trap": "大型成交不一定操控；關鍵是意圖、效果和是否誤導市場。", "memory": "市場外觀被扭曲，就是警號。"}, {"ch": "第7章 市場失當及不當交易", "cat": "合規", "topic": "上市公司內幕消息披露", "point": "上市公司知道內幕消息後，須在合理切實可行範圍內盡快向公眾披露，除非適用安全港/例外。", "trap": "只向分析員或特定投資者透露，可能造成選擇性披露問題。", "memory": "內幕消息要公平公開。"}, {"ch": "第7章 市場失當及不當交易", "cat": "程序", "topic": "MMT 可作命令", "point": "市場失當行為審裁處可作出取消資格令、冷淡對待令、停止及終止令、交還利潤、訟費及調查費等命令。", "trap": "MMT 不是只罰錢；亦可限制市場參與和董事資格。", "memory": "後果可包括錢、資格、市場參與。"}, {"ch": "第7章 市場失當及不當交易", "cat": "責任", "topic": "民事責任", "point": "因市場失當行為而蒙受金錢損失的人，可能有權向違規者追討賠償。", "trap": "監管制裁之外，還可能有私人索償。", "memory": "違規可被監管罰，也可被民事追。"}, {"ch": "第7章 市場失當及不當交易", "cat": "合規", "topic": "未獲邀約造訪 cold call", "point": "向公眾作未獲邀約造訪推銷投資產品受限制，部分情況有豁免；違規合約可被撤銷。", "trap": "電話、即時訊息、上門推銷都要看是否屬未獲邀約造訪。", "memory": "冷敲推銷高風險。"}, {"ch": "第7章 市場失當及不當交易", "cat": "易混", "topic": "不當交易手法", "point": "包括 churning、front running、rat trading、未經授權交易、不合適建議、虛假陳述等，未必全部都是第XIII部市場失當行為，但可構成操守違規。", "trap": "不當交易不一定等於市場失當；但仍可被紀律處分。", "memory": "不是市場失當，也可違反操守。"}, {"ch": "第7章 市場失當及不當交易", "cat": "合規", "topic": "證監會紀律考慮因素", "point": "證監會釐定罰則時會考慮違規嚴重性、持續時間、損失/得益、是否合作、內控缺陷、以往紀錄和阻嚇需要。", "trap": "合作可減輕，但不等於免責。", "memory": "嚴重性 + 得益/損失 + 合作 + 內控。"}, {"ch": "第7章 市場失當及不當交易", "cat": "合規", "topic": "與證監會合作", "point": "及早承認、補救、賠償客戶、改善內控及提供有用資料，可能影響紀律處分結果。", "trap": "事後補救不能消除違規，但會影響處分。", "memory": "出事後：承認、補救、合作、改善。"}];
const KEY='hksi_p2_supp_focus_v1';
let focusOnly=false; let focus=JSON.parse(localStorage.getItem(KEY)||'{}');
const app=document.getElementById('app'), q=document.getElementById('q'), ch=document.getElementById('chapter'), cat=document.getElementById('cat'), count=document.getElementById('count'), focusBtn=document.getElementById('focusBtn');
const headerEl=document.querySelector('header'), hToggle=document.getElementById('hToggle'), headerKey='hksi_p2_supp_header_collapsed';
function applyHeaderState(c){headerEl.classList.toggle('collapsed',c);hToggle.textContent=c?'展開 ▼':'收合 ▲';hToggle.setAttribute('aria-expanded',String(!c));}
const savedHeader=localStorage.getItem(headerKey);
let headerCollapsed=savedHeader===null?window.innerWidth<760:savedHeader==='1';
applyHeaderState(headerCollapsed);
hToggle.addEventListener('click',()=>{headerCollapsed=!headerCollapsed;localStorage.setItem(headerKey,headerCollapsed?'1':'0');applyHeaderState(headerCollapsed);});
function norm(s){return (s||'').toLowerCase().replace(/\s+/g,'')}
function save(){localStorage.setItem(KEY,JSON.stringify(focus));}
function card(r,i){const checked=focus[i]?'checked':'';return `<article class="card" data-i="${i}"><div class="cardtop"><div><span class="tag">${r.cat}</span><span class="tag chiptwo">${r.ch}</span><div class="topic">${r.topic}</div></div><label class="focus"><input type="checkbox" ${checked} onchange="toggleFocus(${i},this.checked)">關注</label></div><div class="section"><div class="label">補充考點</div><div class="point">${r.point}</div></div><div class="section"><div class="label">易錯位</div><div class="point trap">${r.trap}</div></div><div class="section"><div class="label">記憶位</div><div class="point memory">${r.memory}</div></div></article>`}
window.toggleFocus=(i,v)=>{if(v) focus[i]=1; else delete focus[i]; save(); render();}
function render(){const term=norm(q.value);let rows=DATA.map((r,i)=>[r,i]).filter(([r,i])=>{if(ch.value&&r.ch!==ch.value)return false;if(cat.value&&r.cat!==cat.value)return false;if(focusOnly&&!focus[i])return false;if(term){const hay=norm(Object.values(r).join(' '));if(!hay.includes(term))return false}return true;});
count.textContent=`顯示 ${rows.length} / ${DATA.length} 張卡｜已關注 ${Object.keys(focus).length}`; let html=''; let last=''; rows.forEach(([r,i])=>{if(r.ch!==last){if(last) html+='</div>'; html+=`<h2 class="chapter">${r.ch}</h2><div class="grid">`; last=r.ch;} html+=card(r,i);}); if(rows.length) html+='</div>'; else html='<div class="empty">沒有符合條件的卡片</div>'; app.innerHTML=html;}
[q,ch,cat].forEach(el=>el.addEventListener('input',render)); focusBtn.addEventListener('click',()=>{focusOnly=!focusOnly;focusBtn.classList.toggle('active',focusOnly);render();});render();
</script></body></html>
