<header><div class="htitle"><h1>HKSI Paper 6｜40個快速溫習考點</h1><button class="hToggle" id="hToggle" aria-expanded="true">收合 ▲</button></div><div id="hDetails"><div class="sub">根據 Executive Knowledge 的 Paper 6 40點文章整理成中文速溫卡。重點放在定義、豁免、通知期限、基金文件、估值、投資限制及失當行為。</div>
<div class="controls"><input id="q" placeholder="搜尋：例如 CIS、OFC、FMCC、客戶款項、估值、REIT、MPF…"><select id="chapter"><option value="">全部章節</option><option>Topic 1 監管框架</option><option>Topic 2 後勤合規</option><option>Topic 3 資產管理規例</option><option>Topic 4 失當行為</option></select><select id="cat"><option value="">全部類別</option><option>定義</option><option>牌照</option><option>合規</option><option>文件</option><option>營運</option><option>產品</option><option>數字</option><option>風險</option><option>失當</option></select><button id="focusBtn">只看關注</button></div><div class="stats"><span class="pill" id="count"></span><span class="pill">點選右上角「關注」建立臨考清單</span></div></div></header>
<main id="app"></main><footer>資料來源：<a href="https://executiveknowledge.com.hk/how-to-pass-hksi-paper-6/">Executive Knowledge - 40 Things You Should Know to Pass HKSI Paper 6</a>。本頁為中文溫習筆記，不取代 HKSI 原文手冊或法規。</footer>
<script>
const DATA=[{"ch":"Topic 1 監管框架","cat":"定義","topic":"資產管理與 CIS 的核心定義","point":"第9類資產管理包括為他人管理證券或期貨合約組合，以及管理房地產投資計劃。CIS 的重點是參與者不控制日常管理、財產整體管理或收益匯集，目的在讓參與者取得利潤、收入或回報。","trap":"完全附帶於第1/2類業務、集團內安排、專業人士附帶服務等可能被排除；不要見到管理資產就自動判斷一定是第9類。","memory":"CIS 三件事：不管日常、資產或收益匯集、為回報而設。"},{"ch":"Topic 1 監管框架","cat":"合規","topic":"CIS 公開發售及廣告認可","point":"向香港公眾發售 CIS 通常須獲證監會認可；邀請公眾認購、出售、處置證券或參與 CIS 的廣告、邀請及文件也須看是否需要證監會批准。","trap":"證監會可批准、附加條件、拒絕或撤回認可；只售予專業投資者、已符合公司條例的招股章程、交易所批准文件等可能有豁免。","memory":"公開發售看認可；廣告文件也要一起看。"},{"ch":"Topic 1 監管框架","cat":"產品","topic":"開放式基金型公司 OFC","point":"OFC 是具有限責任及可變動股本的 CIS，方便投資者認購和贖回。未經證監會註冊而以 OFC 身份營運可構成罪行。","trap":"OFC 不只是公司法概念；考點包括註冊、命名、股份發行/贖回/定價、董事、投資經理、保管人、核數師、披露和管治。","memory":"OFC = 公司外殼 + 基金功能 + SFC 註冊。"},{"ch":"Topic 1 監管框架","cat":"牌照","topic":"基金分銷商與第1類牌照","point":"基金可由銀行、獨立財務顧問、證券商、理財顧問、保險人或資產管理人直接分銷。分銷若構成證券交易，通常要第1類牌照，除非有豁免。","trap":"若活動只是為第9類資產管理目的而進行，可能有豁免；只介紹客戶、不持有客戶資產、不承擔交易責任，可考慮核准介紹代理人模式，但仍涉及第1類。","memory":"分銷先問：有沒有 dealing？有沒有碰客戶資產？"},{"ch":"Topic 1 監管框架","cat":"合規","topic":"網上分銷及 robo-advice 平台","point":"ODAP 指引涵蓋平台設計、客戶資料、風險管理、管治、覆核監察、紀錄保存、平台上材料、robo-advice、合適性及複雜產品。","trap":"網上平台不是把資料放上網就完事；算法建議、複雜產品、合適性觸發和紀錄都是高頻風險。","memory":"網上平台五件事：設計、資料、風控、合適性、複雜產品。"},{"ch":"Topic 1 監管框架","cat":"合規","topic":"法團專業投資者 CPI 評估","point":"中介人若要豁免部分操守要求，須信納法團 PI 具合適架構、投資流程及控制、決策人有足夠投資背景，並明白相關風險。","trap":"評估要按產品或市場分開做；某產品/市場超過兩年沒有投資活動，應再作評估。不是貼上 PI 標籤就永久豁免。","memory":"CPI 豁免靠實質評估，不靠名銜。"},{"ch":"Topic 1 監管框架","cat":"合規","topic":"AMLO 反洗錢框架","point":"AMLO 針對金融機構及部分非金融專業行業，核心是客戶盡職審查、紀錄保存、監管機構調查監督及紀律權力。持牌法團由 SFC 監管，認可機構由 HKMA，保險公司由保監局。","trap":"違反 AMLO 可同時有刑事責任和監管紀律；僱員或經理明知而容許公司違規亦可能承擔刑責。","memory":"AML 不是內部流程錯漏，而是可變刑事及紀律風險。"},{"ch":"Topic 1 監管框架","cat":"合規","topic":"與證監會合作可減輕處分","point":"及早自願匯報、提供真實完整資料、承認責任、盡快補救和賠償客戶，可能令處分種類或罰款有減輕空間。","trap":"合作不是免責；它影響處分結果，但不能把已發生的違規洗掉。","memory":"出事四步：快報、講真、認責、補救。"},{"ch":"Topic 1 監管框架","cat":"合規","topic":"企業管治與制衡","point":"良好企業管治包括主席與 CEO 分工、非執董、獨立審計委員會、薪酬委員會、提高披露透明度、採用合適會計審計標準、保障少數股東及懲處失當。","trap":"管治缺陷可能導致內幕交易、欺詐、低估關連交易等；不是只考上市公司架構名詞。","memory":"管治 = 制衡 + 透明 + 問責。"},{"ch":"Topic 1 監管框架","cat":"數字","topic":"MPF 受託人資格","point":"所有 MPF 計劃須由 MPFA 批准受託人營運。香港公司受託人須具至少 HK$150m 已繳股本及資產淨值、至少五名合適董事、適當內控及香港實質管理。","trap":"境外公司也須符合相若要求、受可接受境外監管並指定香港 CEO；個人受託人只限僱主營辦計劃，且要提供表現保證。","memory":"MPF 公司受託人：150m、五董事、香港控制。"},{"ch":"Topic 1 監管框架","cat":"牌照","topic":"MPF 中介人：主事中介與附屬中介","point":"銷售、推廣或就 MPF 計劃給意見的人須向 MPFA 註冊。主事中介通常要持保險牌或 SFC 第1/4類牌照，並申請核准負責人及附屬中介。","trap":"附屬中介是掛靠主事中介執行 MPFSO 受規管活動的公司或個人；要留意考題問的是 MPFA 註冊，不是只看 SFC 牌照。","memory":"MPF 銷售意見：先看 MPFA 註冊。"},{"ch":"Topic 2 後勤合規","cat":"數字","topic":"向 SFC 通知的 7 個營業日考點","point":"停辦受規管活動要盡快或不遲於預定停辦日前 7 個營業日通知；擬更改營業地址要至少提前 7 個營業日；向 SFC 提交資料有變、更換董事等通常要在 7 個營業日內通知。","trap":"考試常把『提前通知』和『變更後通知』混在一起；停業及地址是意向通知，資料變更及董事變更是發生後通知。","memory":"SFC 135：很多答案都是 7 個營業日。"},{"ch":"Topic 2 後勤合規","cat":"合規","topic":"重大或疑似違規即時匯報","point":"操守準則要求中介人就自身、僱員或代理人的重大或疑似違反法例、規則、規例、守則、指引或其他適用監管要求，立即向 SFC 匯報。","trap":"『疑似』也可能要報；不要等內部完全查清才開始考慮通知。","memory":"重大或疑似違規：快報 SFC。"},{"ch":"Topic 2 後勤合規","cat":"營運","topic":"客戶證券規則 CSR 範圍","point":"CSR 適用於中介人及其有聯繫實體，處理在香港收到或持有、並與受規管活動有關的香港股票客戶證券。","trap":"不適用於為認可 CIS 提供保管服務的信託公司；若客戶以自己名義在中介人以外的人處開戶持有證券，也可能不適用。海外股票不是 CSR 主要範圍。","memory":"CSR 關鍵詞：香港持有、香港股票、中介/AE。"},{"ch":"Topic 2 後勤合規","cat":"合規","topic":"FRR 財政資源規則","point":"FRR 規定持牌法團的已繳股本及速動資金要求，不適用於註冊機構。持牌法團要保存足夠紀錄證明合規，並在 SFC 要求時提供。","trap":"若不能符合資本要求，要盡快通知 SFC 並停止相關活動；SFC 可暫時吊銷牌照或附條件容許繼續營運。","memory":"FRR 管 LC，不管 RI。"},{"ch":"Topic 2 後勤合規","cat":"營運","topic":"客戶款項規則 CMR","point":"CMR 規管持牌法團及其有聯繫實體在香港收取或持有的客戶款項。客戶款項須存入在 AFI 或 SFC 批准人士開立的獨立信託/客戶帳戶。","trap":"不適用於在香港以外收到或持有、已移出香港、或客戶以自己名義開立銀行戶口持有的款項。若獨立帳戶內發現非客戶款項，知悉後一日內要移出。基金認購款持有超過兩個營業日要入獨立帳戶。","memory":"客戶錢：香港、獨立、非客戶款一日內移走。"},{"ch":"Topic 2 後勤合規","cat":"文件","topic":"月結單內容及 10 個營業日","point":"月結單須在月底後 10 個營業日內發出，內容包括資產管理人名稱地址、客戶資料、結單日期、月底資產估值、未平倉、款項結餘、應收應付、收入費用及月內合約。","trap":"若月內無活動且月底無結餘，可不用發；管理認可 CIS 的資產管理人亦不一定要為該 CIS 發月結單。","memory":"月結單：10 個營業日；無活動無結餘可免。"},{"ch":"Topic 2 後勤合規","cat":"營運","topic":"OFC 營運者：董事、保管人、投資經理、核數師","point":"OFC 董事由成立時識別，日後可按會議或董事權力委任，也可由普通決議罷免。更換保管人或投資經理通常須事先取得 SFC 批准；每間 OFC 須有核數師。","trap":"保管人離任並被替換時，要說明有否需提請股東或債權人注意的情況。董事涉及 OFC 交易利益時要向其他董事申報。","memory":"OFC 四角色：董事管治、保管資產、經理投資、核數審計。"},{"ch":"Topic 2 後勤合規","cat":"文件","topic":"OTC 衍生工具匯報紀錄","point":"場外衍生工具交易紀錄須在終止或到期後至少保存 5 年，且要足以證明已遵守匯報要求。","trap":"即使持牌法團獲豁免匯報，也應保存紀錄證明為何可獲豁免。","memory":"OTC 記錄：到期/終止後 5 年。"},{"ch":"Topic 2 後勤合規","cat":"數字","topic":"OFC 股東會及決議門檻","point":"OFC 董事可召開股東大會；持有至少 10% 投票權的股東可要求董事召開大會及提出決議。特別決議通常要求至少 75% 票數。","trap":"普通股東大會通知期 14 日；罷免或委任董事/核數師的大會通知期 28 日。董事或不少於 5% 股東可提出書面決議。","memory":"OFC 數字：10%、75%、14日、28日、5%。"},{"ch":"Topic 3 資產管理規例","cat":"合規","topic":"FMCC 適用範圍及效力","point":"FMCC 適用於受 SFC 發牌/註冊並管理 CIS 或全權委託帳戶的基金經理。它是基金經理最低操守標準，違反會影響適當人選及紀律風險。","trap":"FMCC 本身通常不是硬法；若與操守準則有不一致，應採更嚴格要求。CIS 與全權帳戶在『fund/client/fund investor』用語上要分清。","memory":"FMCC = 基金經理版操守底線。"},{"ch":"Topic 3 資產管理規例","cat":"合規","topic":"FMCC 員工買賣限制","point":"相關人士包括參與投資決策、取得投資資訊、提出買賣建議的人及其可控制或影響的人。員工交易要客戶優先、避免衝突、披露持倉、取得合規書面批准並保存審計線索。","trap":"批准一般只應短期有效；不得同日與客戶類似買賣、不得在客戶交易/建議前一個交易日內買賣、不得與客戶交叉盤、不得沽空基金經理建議證券、不得搶客戶 IPO、一般至少持有 30 日。","memory":"員工盤：先披露、先批准、客戶先行。"},{"ch":"Topic 3 資產管理規例","cat":"合規","topic":"交叉盤 Cross Trades","point":"客戶帳戶之間交叉盤可行，但須符合雙方最佳利益、符合投資目標、按公平市值、向客戶披露，並在交易前記錄理由。","trap":"公司自營戶與客戶交叉盤要客戶事先同意並明白衝突；員工戶與客戶交叉盤不應容許。","memory":"客客可控；公司客要同意；員工客不應做。"},{"ch":"Topic 3 資產管理規例","cat":"營運","topic":"基金經理投資組合估值","point":"客戶資產須按 CIS 組成文件定期估值，估值基準要向客戶披露。上市證券應用一致基準及獨立來源；非上市或非報價證券可參考第三方交易、專業估值或相關資料。","trap":"停牌或不活躍證券要有程序尋求獨立價格確認、適當撇減或撇銷，或判斷是否轉入基金經理自有帳戶。內部紀錄至少每月與第三方文件核對。","memory":"估值三要：一致、獨立、可核對。"},{"ch":"Topic 3 資產管理規例","cat":"文件","topic":"CIS 披露及 KFS","point":"CIS 發售文件須符合基金手冊披露要求，讓投資者能作知情決定。產品資料概要 KFS 應清晰、簡潔、有效地概述產品主要特點及風險。","trap":"KFS 通常不超過四頁，首頁要提醒投資者不應單靠 KFS 作投資決定；廣告亦須符合適用廣告指引。","memory":"KFS 是摘要，不是完整判斷依據。"},{"ch":"Topic 3 資產管理規例","cat":"文件","topic":"發售文件內容","point":"CIS 發售文件是邀請公眾認購基金單位/股份的文件，通常須 SFC 批准，並以中英文提供。內容包括投資目標及限制、抵押政策、估值定價、流動性風險、交易及贖回、費用、報告、年結、最新財報、KFS 及保管安排等。","trap":"不要只背『發售文件要披露風險』；考題可問具體披露項目，例如交易日頻率、估值頻率、贖回程序、費用稅項、表現數據證據。","memory":"發售文件 = 投資、交易、估值、費用、報告、風險全披露。"},{"ch":"Topic 3 資產管理規例","cat":"文件","topic":"廣告中的表現資料","point":"表現資料要用一致、合理、可靠來源計算及刊發；不得作預測。若使用表現資料，一般須有 6 個月往績，並披露最近 5 年或成立以來的 12 個月回報資料。","trap":"資料要夠新：一般不超過 6 個月；印刷、廣播、互動系統資料通常不超過 3 個月。預期收益率可接受但要有依據及警告正分派率不代表正回報。","memory":"表現廣告：不預測、要往績、要新、要同類比較。"},{"ch":"Topic 3 資產管理規例","cat":"數字","topic":"估值、定價及錯價處理","point":"認購/贖回價通常以 NAV 除以已發行單位或股份，再按費用調整。估值政策由管理公司與受託人/保管人協商建立，須一致、定期覆核，並由獨立合資格人士每年覆核測試。","trap":"基金資產估值頻率須在發售文件披露，且不少於每個交易日。錯價須盡快改正；錯誤達 NAV 0.5% 或以上要通知 SFC；個別投資者損失超過 HK$100 應賠償。","memory":"錯價數字：0.5% 通知，HK$100 賠償。"},{"ch":"Topic 3 資產管理規例","cat":"合規","topic":"經紀回佣與 soft dollar","point":"管理公司及關連人士不得因把交易導向某經紀而保留現金或其他回佣。Soft dollar 服務可保留，但須惠及 CIS 持有人、交易達最佳執行、佣金不高於正常全服務水平、事前在發售文件披露，年報披露實務及所得服務。","trap":"現金回佣與研究/服務型 soft dollar 不同；重點是利益是否回到基金持有人、是否已披露、交易是否仍符合最佳執行。","memory":"Cash rebate 不留；soft dollar 要益投資者及披露。"},{"ch":"Topic 3 資產管理規例","cat":"數字","topic":"認可 CIS 分散投資限制","point":"一般不得把超過 NAV 10% 投資於單一發行人證券，或超過 20% 投資於同一集團；存放於單一實體或同集團現金總額不得超過 NAV 20%；持有單一發行人普通股不得超過 NAV 10%；非上市/非報價/非市場交易股份不得超過 NAV 15%。","trap":"政府或公共證券同一發行可至 30%；若只投這類證券，至少持有六個不同發行。投資其他 CIS 亦有 10%/30% 等限制，且同一管理公司或關連公司管理時初始費用須豁免，不得收取回佣。","memory":"普通 CIS 數字：10、20、15；公債 30；六個發行。"},{"ch":"Topic 3 資產管理規例","cat":"數字","topic":"CIS 其他限制","point":"CIS 通常不得投資實物商品、房地產權益、無限責任交易或裸賣空；賣空證券須在容許賣空且活躍交易的市場買賣，賣空責任不得超過 NAV 10%。","trap":"借款一般不得超過 NAV 10%；證券保證金融資須至少 100% 抵押；若基金名稱顯示特定投資目標、地區或市場，非現金資產至少 70% 要投在相關類別。","memory":"其他限制：禁裸空、借款 10%、抵押 100%、名稱 70%。"},{"ch":"Topic 3 資產管理規例","cat":"數字","topic":"對沖基金最低認購額","point":"單一對沖基金最低首次認購額為 US$50,000；基金中的對沖基金 FofHF 為 US$10,000；有至少 100% 資本保證的對沖基金則無最低額限制。","trap":"三個門檻常被混考；資本保證越高不代表所有規則都不用看，只是這個最低認購額可免。","memory":"Hedge fund：50k；FofHF：10k；100% 保本：無門檻。"},{"ch":"Topic 3 資產管理規例","cat":"數字","topic":"管理公司資格","point":"每個認可 CIS 須委任 SFC 接受的管理公司，少數自我管理計劃例外。管理公司應主要從事基金管理，最低已發行及繳足股本加資本儲備為 HK$10m，保持正資產淨值，且無重大借貸。","trap":"應付控股公司的款項可計入資本，但須從屬於所有其他負債，且未經 SFC 事先同意不得償還。自我管理計劃董事不得以主事人身份與計劃交易。","memory":"管理公司：主業基金管理，資本 10m，正 NAV。"},{"ch":"Topic 3 資產管理規例","cat":"數字","topic":"受託人/保管人資格及獨立性","point":"受託人/保管人雖不直接由 SFC 監管，但須為 CIS 認可而獲 SFC 接受。可接受類別包括持牌銀行、持牌銀行附屬信託公司、註冊信託公司或 SFC 接受的境外銀行/信託公司。","trap":"須獨立審計，最低已發行繳足及不可分派資本儲備 HK$10m；若由資產淨值 HK$2b 的重大金融機構全資擁有並作出支持承諾，可作替代。與管理公司同屬一集團時，要符合共同控股下的獨立條件。","memory":"保管人：可接受 + 10m 資本 + 與管理公司獨立。"},{"ch":"Topic 3 資產管理規例","cat":"產品","topic":"REIT 認可特徵","point":"REIT 是以信託形式構成的 CIS，投資產生經常性租金收入的房地產，主動買賣房地產受限制，多數收入來自租金，並須分派重大比例收入作股息。","trap":"須定明最高借款限額，關連方交易受持有人批准約束；須有香港居民獲 SFC 批准接受通知及決定；SFC 認可 REIT 須在可接受期間內於聯交所上市。","memory":"REIT：信託、租金、分派、上市。"},{"ch":"Topic 3 資產管理規例","cat":"風險","topic":"流動性風險管理","point":"管理公司要了解基金投資者結構及歷史/預期贖回模式，在發售文件披露流動性風險影響、流動性風險管理流程和工具。","trap":"不是只在基金成立時做一次；要持續評估資產與負債流動性、把資產分類、設定內部指標，並定期壓力測試，由流動性風險委員會或高級管理層覆核結果。","memory":"流動性管理：了解投資者、分類資產、壓測工具。"},{"ch":"Topic 3 資產管理規例","cat":"合規","topic":"內地與香港基金互認持續責任","point":"認可內地基金在香港銷售時，須在內地保持受監管及符合組成文件；在香港須遵守銷售分銷規則、附加規則、提供可查閱文件、雙語發售文件及 KFS。","trap":"若不再符合香港要求，要通知香港監管機構、停止推廣及停止接受認購。兩地投資者要公平平等；一地披露、通知或違規匯報，通常要同步給另一地投資者或監管機構。","memory":"互認基金：Home、Host、Both 三層責任。"},{"ch":"Topic 3 資產管理規例","cat":"產品","topic":"MPF 產品與 DIS","point":"MPF 計劃須有兩個或以上成分基金供成員選擇；成分基金可直接投資或投資於匯集投資基金。MPF 計劃須向 MPFA 註冊，成分基金和匯集投資基金須獲 MPFA 批准。","trap":"SFC 主要負責認可 MPF 計劃、成分基金及匯集投資基金的披露及推廣材料。每個 MPF 計劃須提供預設投資策略 DIS，供未作選擇成員使用，成員也可主動選用。","memory":"MPF 產品：MPFA 批計劃，SFC 看披露推廣，DIS 是預設。"},{"ch":"Topic 4 失當行為","cat":"失當","topic":"披露虛假或誤導資料誘使交易","point":"若有人故意、罔顧後果或疏忽地披露、傳播或流傳涉及重大事實的虛假或誤導資料或遺漏，而相當可能誘使認購、買賣證券或期貨，或影響價格，即可能構成市場失當行為。","trap":"真誠作為傳遞渠道轉傳資料的人可有抗辯空間；重點看資料是否重大、是否虛假/誤導、是否可能誘使交易或影響價格。","memory":"假資料 + 重大 + 誘使交易/影響價格 = 高危。"},{"ch":"Topic 4 失當行為","cat":"失當","topic":"Churning 過度買賣","point":"在基金或全權委託帳戶中過度買入或賣出投資，目的在產生更多以佣金為基礎的收入，屬不當交易手法。","trap":"即使每筆交易本身看似有授權，也可能因整體頻率、目的和客戶最佳利益問題構成失當。","memory":"Churning = 為佣金而過度交易，不為客戶。"}];

function applyHeaderState(c){headerEl.classList.toggle('collapsed',c);hToggle.textContent=c?'展開 ▼':'收合 ▲';hToggle.setAttribute('aria-expanded',String(!c));}
const savedHeader=localStorage.getItem(headerKey);
let headerCollapsed=savedHeader===null?window.innerWidth<760:savedHeader==='1';
applyHeaderState(headerCollapsed);
hToggle.addEventListener('click',()=>{headerCollapsed=!headerCollapsed;localStorage.setItem(headerKey,headerCollapsed?'1':'0');applyHeaderState(headerCollapsed);});
function norm(s){return (s||'').toLowerCase().replace(/\s+/g,'')}
function save(){localStorage.setItem(KEY,JSON.stringify(focus));}
function card(r,i){const checked=focus[i]?'checked':'';return `<article class="card" data-i="${i}"><div class="cardtop"><div><span class="tag">${r.cat}</span><span class="tag chiptwo">${r.ch}</span><div class="topic">${r.topic}</div></div><label class="focus"><input type="checkbox" ${checked} onchange="toggleFocus(${i},this.checked)">關注</label></div><div class="section"><div class="label">補充考點</div><div class="point">${r.point}</div></div><div class="section"><div class="label">易錯位</div><div class="point trap">${r.trap}</div></div><div class="section"><div class="label">記憶位</div><div class="point memory">${r.memory}</div></div></article>`}
window.toggleFocus=(i,v)=>{if(v) focus[i]=1; else delete focus[i]; save(); render();}
function render(){const term=norm(q.value);let rows=DATA.map((r,i)=>[r,i]).filter(([r,i])=>{if(ch.value&&r.ch!==ch.value)return false;if(cat.value&&r.cat!==cat.value)return false;if(focusOnly&&!focus[i])return false;if(term){const hay=norm(Object.values(r).join(' '));if(!hay.includes(term))return false}return true;});
count.textContent=`顯示 ${rows.length} / ${DATA.length} 張卡｜已關注 ${Object.keys(focus).length}`; let html=''; let last=''; rows.forEach(([r,i])=>{if(r.ch!==last){if(last) html+='</div>'; html+=`<h2 class="chapter">${r.ch}</h2><div class="grid">`; last=r.ch;} html+=card(r,i);}); if(rows.length) html+='</div>'; else html='<div class="empty">沒有符合條件的卡片</div>'; app.innerHTML=html;}
[q,ch,cat].forEach(el=>el.addEventListener('input',render)); focusBtn.addEventListener('click',()=>{focusOnly=!focusOnly;focusBtn.classList.toggle('active',focusOnly);render();});render();
</script></body></html>
